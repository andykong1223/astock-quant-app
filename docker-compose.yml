# AStock Quant 生产编排
# 用法：
#   cp .env.docker.example .env.docker   # 填写密钥
#   ./scripts/deploy.sh up
#
# 镜像默认走国内源（DOCKER_REGISTRY，见 .env.docker）

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.m.daocloud.io}
    container_name: astock-api
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - "3000"
    networks:
      - astock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.m.daocloud.io}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${VITE_SUPABASE_PUBLISHABLE_KEY:-}}
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-false}
    container_name: astock-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - astock

  redis:
    image: ${DOCKER_REGISTRY:-docker.m.daocloud.io}/library/redis:7-alpine
    container_name: astock-redis
    restart: unless-stopped
    profiles: ["redis"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - astock

networks:
  astock:
    driver: bridge

volumes:
  redis_data:
